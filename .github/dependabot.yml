version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "gomod"
    directory: "/workers/go"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "gomod"
    directory: "/workers/go/harness/api"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "npm"
    directory: "/workers/typescript"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "pip"
    directory: "/workers/python"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "pip"
    directory: "/workers/python/harness"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "pip"
    directory: "/workers/python/projects/tests/helloworld"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "gradle"
    directory: "/workers/java"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "gradle"
    directory: "/workers/java/harness"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "bundler"
    directory: "/workers/ruby"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "bundler"
    directory: "/workers/ruby/harness"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "cargo"
    directory: "/loadgen/kitchen-sink-gen"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
